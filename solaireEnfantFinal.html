<!-- SCRIPT -->
<script>
	
	// POPUP
    const items = document.querySelectorAll('.item');
    const popupOverlay = document.getElementById('popup-overlay');
    const popup = document.getElementById('popup');
    const popupImgf = document.getElementById('popup-imgf');
	const popupImgp = document.getElementById('popup-imgp');
    const popupTitle = popup.querySelector('h2');
    const popupMarque = popup.querySelectorAll('p')[0];
	const popupReference = popup.querySelectorAll('p')[1];
    const popupCouleur = popup.querySelectorAll('p')[2];
    const popupPrix = popup.querySelectorAll('p')[3];
    const closeBtn = document.getElementById('popup-close');
    const prevBtn = document.getElementById('popup-prev');
    const nextBtn = document.getElementById('popup-next');

    let currentIndex = 0;

  const prevBtnP = document.getElementById("prevPage");
  const nextBtnP = document.getElementById("nextPage");
  const pageInfo = document.getElementById("pageInfo");

  const ITEMS_PER_PAGE = 16;
  let currentPage = 1;
  let filteredItems = [...items];


    function showPopup(index) {
      const item = items[index];
      popupImgf.src = item.dataset.imgf;
	  popupImgp.src = item.dataset.imgp;
      popupTitle.textContent = item.querySelector('p').textContent;
      popupMarque.textContent = "Marque : " + item.dataset.marque;
      popupReference.textContent = "Modele : " + item.dataset.reference;
      popupCouleur.textContent = "Couleur : " + item.dataset.couleur;
      popupPrix.textContent = "Prix : " + item.dataset.prix;
      popupOverlay.style.display = "flex";
      currentIndex = index;
    }

    items.forEach((item, index) => {
      item.addEventListener('click', () => showPopup(index));
    });

    closeBtn.addEventListener('click', () => popupOverlay.style.display = "none");

    prevBtn.addEventListener('click', () => {
      currentIndex = (currentIndex - 1 + items.length) % items.length;
      showPopup(currentIndex);
    });

    nextBtn.addEventListener('click', () => {
      currentIndex = (currentIndex + 1) % items.length;
      showPopup(currentIndex);
    });

    popupOverlay.addEventListener('click', e => {
      if(e.target === popupOverlay) popupOverlay.style.display = "none";
    });

 /* ===============================
     PAGINATION
  =============================== */

  function updateDisplay() {

    items.forEach(item => item.style.display = "none");

    const start = (currentPage - 1) * ITEMS_PER_PAGE;
    const pageItems = filteredItems.slice(start, start + ITEMS_PER_PAGE);

    pageItems.forEach(item => item.style.display = "block");

    const totalPages = Math.max(1, Math.ceil(filteredItems.length / ITEMS_PER_PAGE));

    pageInfo.textContent = `Page ${currentPage} / ${totalPages} (${filteredItems.length} modèles)`;

    prevBtnP.disabled = currentPage === 1;
    nextBtnP.disabled = currentPage === totalPages;
  }

  prevBtnP.addEventListener("click", () => {
    currentPage--;
    updateDisplay();
  });

  nextBtnP.addEventListener("click", () => {
    currentPage++;
    updateDisplay();
  });

    currentPage = 1;
    updateDisplay();

document.addEventListener("DOMContentLoaded", () => {

  const items = Array.from(document.querySelectorAll(".item"));
  const searchInput = document.getElementById("searchInput");
  const searchBtn = document.getElementById("searchBtn");

  const prevBtn = document.getElementById("prevPage");
  const nextBtn = document.getElementById("nextPage");
  const pageInfo = document.getElementById("pageInfo");

  const ITEMS_PER_PAGE = 16;
  let currentPage = 1;
  let filteredItems = [...items];
  
   /* ===============================
     INIT
  =============================== */

  updateDisplay();

});
</script>
